name: Drift Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  drift-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install root dependencies
        run: npm install

      - name: Build shared contracts
        run: npm --prefix shared run build

      - name: Build backend
        run: npm --prefix backend/api run build

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run backend tests (exclude live fixture host dependency)
        shell: bash
        run: |
          TEST_FILES=$(ls backend/api/tests/*.test.js | grep -v "fixture-integration.test.js")
          node --test $TEST_FILES
