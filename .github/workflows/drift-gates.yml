name: Drift Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  drift-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            shared/package-lock.json
            backend/package-lock.json
            backend/api/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install shared dependencies
        run: npm --prefix shared ci --no-audit --no-fund

      - name: Install backend dependencies
        run: npm --prefix backend ci --no-audit --no-fund

      - name: Install backend api dependencies
        run: npm --prefix backend/api ci --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --no-audit --no-fund

      - name: Build shared contracts
        run: npm --prefix shared run build

      - name: Build backend
        run: npm --prefix backend/api run build

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run backend tests (exclude live fixture host dependency)
        shell: bash
        run: |
          TEST_FILES=$(ls backend/api/tests/*.test.js | grep -v "fixture-integration.test.js")
          node --test $TEST_FILES
