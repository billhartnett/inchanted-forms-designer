name: CI Backend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          pnpm install

      - name: Monorepo build chain (shared -> wave8 -> wave9 -> backend/api)
        run: |
          pnpm --filter shared build
          pnpm --filter wave8 build
          pnpm --filter wave9 build
          pnpm --filter backend/api build

      - name: TypeScript compile checks
        run: |
          node node_modules/.bin/tsc -p shared/tsconfig.json --noEmit
          node node_modules/.bin/tsc -p backend/api/tsconfig.json --noEmit

      - name: Start Express backend and run endpoint smoke tests
        run: |
          npm --prefix backend/api run start:express > backend-api.log 2>&1 &
          APP_PID=$!
          trap "kill $APP_PID" EXIT

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/ping >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8080/api/ping
          curl -fsS -H "x-actor-role: viewer" -H "x-tenant-id: ci-tenant" http://127.0.0.1:8080/api/gethealth
          curl -fsS http://127.0.0.1:8080/api/version
