name: PR Label Strict Mode Gate

on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - reopened
      - opened

jobs:
  requires-strict-mode:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'requires-strict-mode')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install

      - name: Run strict live-host-only tuning integration
        run: npm --prefix backend/api run diag:tuning:integration:strict

      - name: Validate strict failure classification fields
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='training-data/acord-labeled/sprint5_tuning_validation_report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const ok=typeof r.hostHealthFailure==='boolean' && typeof r.mappingThresholdFailure==='boolean';if(!ok){console.error('classification fields missing');process.exit(1);}if(!r.pass && !['hostHealthFailure','mappingThresholdFailure'].includes(r.failureClass)){console.error('invalid failureClass',r.failureClass);process.exit(1);}console.log('classification ok');"
