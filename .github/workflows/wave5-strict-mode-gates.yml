name: Wave5 Strict Mode Gates

on:
  schedule:
    - cron: "0 5 * * *"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  push:
    branches:
      - main
      - release/**
      - sprint-exit/**
  workflow_dispatch:

jobs:
  strict-mode-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    env:
      ENFORCE_STRICT: ${{ github.event_name == 'schedule' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/sprint-exit/') || (github.event_name == 'pull_request' && contains(join(github.event.pull_request.labels.*.name, ','), 'requires-strict-mode')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            backend/package-lock.json
            backend/api/package-lock.json

      - name: Install shared dependencies
        run: npm --prefix shared ci --no-audit --no-fund

      - name: Install backend dependencies
        run: npm --prefix backend ci --no-audit --no-fund

      - name: Install backend api dependencies
        run: npm --prefix backend/api ci --no-audit --no-fund

      - name: Build shared
        run: npm --prefix shared run build

      - name: Build backend
        run: npm --prefix backend/api run build

      - name: Run fast deterministic tuning mode
        run: npm --prefix backend/api run diag:tuning:integration:fast

      - name: Run strict live-host-only tuning mode when enforced
        if: env.ENFORCE_STRICT == 'true'
        run: npm --prefix backend/api run diag:tuning:integration:strict

      - name: Upload Sprint 5 tuning artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave5-sprint5-tuning-artifacts
          if-no-files-found: ignore
          path: |
            training-data/acord-labeled/sprint5_tuning_validation_report.json
            training-data/acord-labeled/wave5_phase2_sprint5_tuning_integration_report.md
            training-data/acord-labeled/wave5_phase2_sprint5_tuning_diagnostics_summary.json
            training-data/acord-labeled/wave5_phase2_sprint5_tuning_regression_report.json

      - name: Enforce strict mode failure class guard
        if: env.ENFORCE_STRICT == 'true'
        shell: bash
        run: |
          node -e "const fs=require('fs'); const p='training-data/acord-labeled/sprint5_tuning_validation_report.json'; const r=JSON.parse(fs.readFileSync(p,'utf8')); if (r.mode!=='strict_live_host_only') { console.error('strict mode not executed'); process.exit(1);} if (!r.pass && !['hostHealthFailure','mappingThresholdFailure'].includes(r.failureClass)) { console.error('invalid failureClass', r.failureClass); process.exit(1);} console.log('strict mode classification valid:', r.failureClass || 'none');"
