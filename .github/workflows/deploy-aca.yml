name: Deploy ACA

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override (default: tag name or sha-<commit>)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-aca
  cancel-in-progress: true

jobs:
  resolve-image:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    outputs:
      tag: ${{ steps.image.outputs.tag }}
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.image.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image digest artifact from build-image workflow
        id: digest_artifact
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: build-image.yml
          name: backend-image-digest
          path: .

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve image digest
        id: image
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            EXPECTED_TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            EXPECTED_TAG="${GITHUB_REF_NAME}"
          else
            EXPECTED_TAG="sha-${GITHUB_SHA::12}"
          fi

          if [[ -f image-digest.txt ]]; then
            DIGEST="$(grep '^digest=' image-digest.txt | cut -d= -f2-)"
            IMAGE_REPO="$(grep '^image_repo=' image-digest.txt | cut -d= -f2-)"
            TAG_FROM_ARTIFACT="$(grep '^semver_tag=' image-digest.txt | cut -d= -f2-)"
            if [[ -z "${TAG_FROM_ARTIFACT}" ]]; then
              TAG_FROM_ARTIFACT="$(grep '^sha_tag=' image-digest.txt | cut -d= -f2-)"
            fi
            if [[ -n "${DIGEST}" && -n "${IMAGE_REPO}" && "${DIGEST}" == sha256:* && "${TAG_FROM_ARTIFACT}" == "${EXPECTED_TAG}" ]]; then
              echo "tag=${TAG_FROM_ARTIFACT}" >> "$GITHUB_OUTPUT"
              echo "image=${IMAGE_REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
              echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          LOGIN_SERVER="${{ secrets.ACR_LOGIN_SERVER }}"
          REPO="wave9-backend-api"

          DIGEST=""
          for attempt in {1..30}; do
            DIGEST="$(az acr manifest list-metadata --registry "${{ secrets.ACR_NAME }}" --name "$REPO" --query "[?tags[?@=='${EXPECTED_TAG}']].digest | [0]" -o tsv)"
            if [[ -n "${DIGEST}" ]]; then
              break
            fi
            echo "Digest for tag ${EXPECTED_TAG} not available yet (attempt ${attempt}/30); waiting 20s..."
            sleep 20
          done

          if [[ -z "${DIGEST}" ]]; then
            echo "No manifest digest found for tag ${EXPECTED_TAG}" >&2
            exit 1
          fi

          echo "tag=${EXPECTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${LOGIN_SERVER}/${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Guard digest output
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ steps.image.outputs.digest }}" ]]; then
            echo "Resolved digest is empty; refusing deployment" >&2
            exit 1
          fi
          if [[ "${{ steps.image.outputs.digest }}" != sha256:* ]]; then
            echo "Resolved digest is not a valid sha256 digest" >&2
            exit 1
          fi

  deploy-staging:
    needs: resolve-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prevent deploy without digest
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.resolve-image.outputs.digest }}" ]]; then
            echo "Missing image digest from resolve-image job" >&2
            exit 1
          fi

      - name: Inject ACA app secrets and runtime env (staging)
        shell: bash
        run: |
          set -euo pipefail

          MAX_PROPAGATION_ATTEMPTS=24
          PROPAGATION_DELAY_SECONDS=15
          TRANSIENT_RETRY_PATTERN="Identity with resource ID 'system' not found|principalId.*not found|could not be found|BadRequest|ContainerAppOperationInProgress|active provisioning operation in progress|Connection reset by peer|Connection aborted|The command failed with an unexpected error"

          wait_for_app_ready() {
            local label="$1"
            local state=""
            for ready_attempt in {1..40}; do
              state="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.provisioningState -o tsv)"
              if [[ "${state}" == "Succeeded" ]]; then
                return 0
              fi
              if [[ "${state}" == "Failed" || "${state}" == "Canceled" ]]; then
                echo "Container app reached terminal provisioningState=${state} before ${label}" >&2
                return 2
              fi
              sleep 10
            done
            echo "Container app remained in provisioningState=InProgress before ${label}; last state=${state}" >&2
            return 1
          }

          restart_latest_revision() {
            local label="$1"
            local revision_name=""
            revision_name="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.latestRevisionName -o tsv)"
            if [[ -z "${revision_name}" || "${revision_name}" == "null" ]]; then
              echo "No latest revision found for restart during ${label}" >&2
              return 1
            fi

            set +e
            RESTART_OUT="$(az containerapp revision restart \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --revision "${revision_name}" \
              --output none 2>&1)"
            RESTART_CODE=$?
            set -e
            if [[ ${RESTART_CODE} -ne 0 ]]; then
              if echo "${RESTART_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
                echo "revision restart transiently blocked during ${label}; waiting ${PROPAGATION_DELAY_SECONDS}s..."
                sleep "${PROPAGATION_DELAY_SECONDS}"
                return 0
              fi
              echo "${RESTART_OUT}" >&2
              return ${RESTART_CODE}
            fi
            sleep 15
            return 0
          }

          ensure_app_ready() {
            local label="$1"

            set +e
            wait_for_app_ready "${label}"
            READY_CODE=$?
            set -e

            if [[ ${READY_CODE} -eq 0 ]]; then
              return 0
            fi

            if [[ ${READY_CODE} -eq 2 ]]; then
              echo "Attempting revision restart recovery before ${label}..."
              restart_latest_revision "${label}" || echo "Revision restart recovery failed before ${label}; continuing to mutation retry path." >&2

              set +e
              wait_for_app_ready "${label} after revision restart"
              READY_CODE=$?
              set -e

              if [[ ${READY_CODE} -eq 0 ]]; then
                return 0
              fi

              echo "Provisioning state is still not Succeeded before ${label} after revision restart; continuing to mutation retry path." >&2
              return 0
            fi

            echo "Readiness check timed out before ${label}; continuing to mutation retry path." >&2
            return 0
          }

          IDENTITY_TYPE="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query identity.type -o tsv)"
          if [[ "${IDENTITY_TYPE}" != *"SystemAssigned"* ]]; then
            ASSIGNED=0
            for attempt in {1..6}; do
              set +e
              ASSIGN_OUT="$(az containerapp identity assign \
                --name "${{ secrets.ACA_APP_NAME }}" \
                --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
                --system \
                --output none 2>&1)"
              ASSIGN_CODE=$?
              set -e
              if [[ ${ASSIGN_CODE} -eq 0 ]]; then
                ASSIGNED=1
                break
              fi
              if echo "${ASSIGN_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
                sleep 10
                continue
              fi
              echo "${ASSIGN_OUT}" >&2
              exit ${ASSIGN_CODE}
            done
            if [[ ${ASSIGNED} -ne 1 ]]; then
              echo "Timed out waiting to assign system identity for staging app" >&2
              exit 1
            fi
          fi

          # System-assigned identity can take time to propagate for revision provisioning.
          PRINCIPAL_ID=""
          for attempt in {1..20}; do
            PRINCIPAL_ID="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query identity.principalId -o tsv)"
            if [[ -n "${PRINCIPAL_ID}" && "${PRINCIPAL_ID}" != "null" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "${PRINCIPAL_ID}" || "${PRINCIPAL_ID}" == "null" ]]; then
            echo "Timed out waiting for system identity principalId for staging app" >&2
            exit 1
          fi

          # Give ARM/ACA a short stabilization window after principalId appears.
          sleep 20

          REGISTRY_IDENTITY="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query "properties.configuration.registries[?server=='${{ secrets.ACR_LOGIN_SERVER }}'].identity | [0]" -o tsv)"
          REGISTRY_SET=0
          if [[ "${REGISTRY_IDENTITY}" == "system" ]]; then
            REGISTRY_SET=1
          fi
          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            if [[ ${REGISTRY_SET} -eq 1 ]]; then
              break
            fi
            ensure_app_ready "staging registry set"
            set +e
            REGISTRY_OUT="$(az containerapp registry set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --identity system \
              --output none 2>&1)"
            REGISTRY_CODE=$?
            set -e
            if [[ ${REGISTRY_CODE} -eq 0 ]]; then
              REGISTRY_SET=1
              break
            fi
            if echo "${REGISTRY_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "registry set not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${REGISTRY_OUT}" >&2
            exit ${REGISTRY_CODE}
          done
          if [[ ${REGISTRY_SET} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation during staging registry set" >&2
            exit 1
          fi

          # Optional fallback: if ACR pull credentials are provided, bind the registry with credentials
          # to avoid any residual managed-identity propagation race during secret/env mutation.
          if [[ -n "${{ secrets.ACR_PULL_USERNAME }}" && -n "${{ secrets.ACR_PULL_PASSWORD }}" ]]; then
            ensure_app_ready "staging registry credential fallback"
            az containerapp registry set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --username "${{ secrets.ACR_PULL_USERNAME }}" \
              --password "${{ secrets.ACR_PULL_PASSWORD }}" \
              --output none
          fi

          EXISTING_SECRETS="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query "properties.configuration.secrets[].name" -o tsv || true)"
          if grep -qx "azure-storage-connection-string" <<< "${EXISTING_SECRETS}" \
            && grep -qx "di-endpoint" <<< "${EXISTING_SECRETS}" \
            && grep -qx "di-key" <<< "${EXISTING_SECRETS}" \
            && grep -qx "openai-endpoint" <<< "${EXISTING_SECRETS}" \
            && grep -qx "openai-api-key" <<< "${EXISTING_SECRETS}"; then
            SECRET_SET=1
          else
            SECRET_SET=0
          fi

          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            if [[ ${SECRET_SET} -eq 1 ]]; then
              break
            fi
            ensure_app_ready "staging secret set"
            set +e
            SECRET_OUT="$(az containerapp secret set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --secrets \
              azure-storage-connection-string='${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}' \
              di-endpoint='${{ secrets.DI_ENDPOINT }}' \
              di-key='${{ secrets.DI_KEY }}' \
              openai-endpoint='${{ secrets.OPENAI_ENDPOINT }}' \
              openai-api-key='${{ secrets.OPENAI_API_KEY }}' \
              --output none 2>&1)"
            SECRET_CODE=$?
            set -e
            if [[ ${SECRET_CODE} -eq 0 ]]; then
              SECRET_SET=1
              break
            fi
            if echo "${SECRET_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "secret set not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${SECRET_OUT}" >&2
            exit ${SECRET_CODE}
          done
          if [[ ${SECRET_SET} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation during staging secret set" >&2
            exit 1
          fi

          UPDATED=0
          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            ensure_app_ready "staging env update"
            set +e
            UPDATE_OUT="$(az containerapp update \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --set-env-vars \
              NODE_ENV=production \
              PORT=8080 \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string \
              DI_ENDPOINT=secretref:di-endpoint \
              DI_KEY=secretref:di-key \
              OPENAI_ENDPOINT=secretref:openai-endpoint \
              OPENAI_API_KEY=secretref:openai-api-key \
              OPENAI_DEPLOYMENT='${{ secrets.OPENAI_DEPLOYMENT }}' \
              EMBEDDING_MODEL='${{ secrets.EMBEDDING_MODEL }}' \
              --output none 2>&1)"
            UPDATE_CODE=$?
            set -e
            if [[ ${UPDATE_CODE} -eq 0 ]]; then
              UPDATED=1
              break
            fi
            if echo "${UPDATE_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "env update not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${UPDATE_OUT}" >&2
            exit ${UPDATE_CODE}
          done
          if [[ ${UPDATED} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation for staging app" >&2
            exit 1
          fi

      - name: Apply ACA manifest (staging)
        shell: bash
        run: |
          set -euo pipefail
          cp backend/api/deploy/aca/containerapp.yaml containerapp.effective.yaml
          sed -i "s|<SUBSCRIPTION_ID>|${{ secrets.AZURE_SUBSCRIPTION_ID }}|g" containerapp.effective.yaml
          sed -i "s|<RG>|${{ secrets.ACA_RESOURCE_GROUP }}|g" containerapp.effective.yaml
          sed -i "s|<ACA_ENV_NAME>|${{ secrets.ACA_ENV_NAME }}|g" containerapp.effective.yaml
          sed -i "s|<ACR_NAME>|${{ secrets.ACR_NAME }}|g" containerapp.effective.yaml
          sed -i "s|<TAG>|${{ needs.resolve-image.outputs.tag }}|g" containerapp.effective.yaml
          sed -i "s|name: inchanted-api|name: ${{ secrets.ACA_APP_NAME }}|" containerapp.effective.yaml
          sed -i "s|<BUILD_TIMESTAMP_ISO8601>|$(date -u +%Y-%m-%dT%H:%M:%SZ)|g" containerapp.effective.yaml
          sed -i "s|<GIT_COMMIT_SHA>|${{ github.sha }}|g" containerapp.effective.yaml
          sed -i "s|<WAVE9_ENGINE_VERSION>|${{ needs.resolve-image.outputs.tag }}|g" containerapp.effective.yaml
          sed -i "s|<REVISION_SUFFIX>|wave9-$(echo "${{ github.sha }}" | cut -c1-8)|g" containerapp.effective.yaml

          az containerapp update \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --yaml containerapp.effective.yaml \
            --output none

      - name: Pin deployed image to resolved digest (staging)
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --image "${{ needs.resolve-image.outputs.image }}" \
            --output none

      - name: Verify new revision creation (staging)
        id: rev
        shell: bash
        run: |
          set -euo pipefail
          REVISION="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.latestReadyRevisionName -o tsv)"
          if [[ -z "${REVISION}" ]]; then
            echo "No latest ready revision found" >&2
            exit 1
          fi
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Verify container startup logs (staging)
        shell: bash
        run: |
          az containerapp logs show \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --tail 80

      - name: Post-deploy health probes (staging)
        shell: bash
        run: |
          set -euo pipefail
          FQDN="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.configuration.ingress.fqdn -o tsv)"
          BASE_URL="https://${FQDN}"

          curl -fsS "${BASE_URL}/api/ping"
          curl -fsS -H "x-actor-role: viewer" -H "x-tenant-id: aca-deploy" "${BASE_URL}/api/gethealth"
          curl -fsS "${BASE_URL}/api/version"

  deploy-production:
    needs:
      - resolve-image
      - deploy-staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prevent deploy without digest
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.resolve-image.outputs.digest }}" ]]; then
            echo "Missing image digest from resolve-image job" >&2
            exit 1
          fi

      - name: Inject ACA app secrets and runtime env (production)
        shell: bash
        run: |
          set -euo pipefail

          MAX_PROPAGATION_ATTEMPTS=24
          PROPAGATION_DELAY_SECONDS=15
          TRANSIENT_RETRY_PATTERN="Identity with resource ID 'system' not found|principalId.*not found|could not be found|BadRequest|ContainerAppOperationInProgress|active provisioning operation in progress|Connection reset by peer|Connection aborted|The command failed with an unexpected error"

          wait_for_app_ready() {
            local label="$1"
            local state=""
            for ready_attempt in {1..40}; do
              state="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.provisioningState -o tsv)"
              if [[ "${state}" == "Succeeded" ]]; then
                return 0
              fi
              if [[ "${state}" == "Failed" || "${state}" == "Canceled" ]]; then
                echo "Container app reached terminal provisioningState=${state} before ${label}" >&2
                return 2
              fi
              sleep 10
            done
            echo "Container app remained in provisioningState=InProgress before ${label}; last state=${state}" >&2
            return 1
          }

          restart_latest_revision() {
            local label="$1"
            local revision_name=""
            revision_name="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.latestRevisionName -o tsv)"
            if [[ -z "${revision_name}" || "${revision_name}" == "null" ]]; then
              echo "No latest revision found for restart during ${label}" >&2
              return 1
            fi

            set +e
            RESTART_OUT="$(az containerapp revision restart \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --revision "${revision_name}" \
              --output none 2>&1)"
            RESTART_CODE=$?
            set -e
            if [[ ${RESTART_CODE} -ne 0 ]]; then
              if echo "${RESTART_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
                echo "revision restart transiently blocked during ${label}; waiting ${PROPAGATION_DELAY_SECONDS}s..."
                sleep "${PROPAGATION_DELAY_SECONDS}"
                return 0
              fi
              echo "${RESTART_OUT}" >&2
              return ${RESTART_CODE}
            fi
            sleep 15
            return 0
          }

          ensure_app_ready() {
            local label="$1"

            set +e
            wait_for_app_ready "${label}"
            READY_CODE=$?
            set -e

            if [[ ${READY_CODE} -eq 0 ]]; then
              return 0
            fi

            if [[ ${READY_CODE} -eq 2 ]]; then
              echo "Attempting revision restart recovery before ${label}..."
              restart_latest_revision "${label}" || echo "Revision restart recovery failed before ${label}; continuing to mutation retry path." >&2

              set +e
              wait_for_app_ready "${label} after revision restart"
              READY_CODE=$?
              set -e

              if [[ ${READY_CODE} -eq 0 ]]; then
                return 0
              fi

              echo "Provisioning state is still not Succeeded before ${label} after revision restart; continuing to mutation retry path." >&2
              return 0
            fi

            echo "Readiness check timed out before ${label}; continuing to mutation retry path." >&2
            return 0
          }

          IDENTITY_TYPE="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query identity.type -o tsv)"
          if [[ "${IDENTITY_TYPE}" != *"SystemAssigned"* ]]; then
            ASSIGNED=0
            for attempt in {1..6}; do
              set +e
              ASSIGN_OUT="$(az containerapp identity assign \
                --name "${{ secrets.ACA_APP_NAME }}" \
                --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
                --system \
                --output none 2>&1)"
              ASSIGN_CODE=$?
              set -e
              if [[ ${ASSIGN_CODE} -eq 0 ]]; then
                ASSIGNED=1
                break
              fi
              if echo "${ASSIGN_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
                sleep 10
                continue
              fi
              echo "${ASSIGN_OUT}" >&2
              exit ${ASSIGN_CODE}
            done
            if [[ ${ASSIGNED} -ne 1 ]]; then
              echo "Timed out waiting to assign system identity for production app" >&2
              exit 1
            fi
          fi

          # System-assigned identity can take time to propagate for revision provisioning.
          PRINCIPAL_ID=""
          for attempt in {1..20}; do
            PRINCIPAL_ID="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query identity.principalId -o tsv)"
            if [[ -n "${PRINCIPAL_ID}" && "${PRINCIPAL_ID}" != "null" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "${PRINCIPAL_ID}" || "${PRINCIPAL_ID}" == "null" ]]; then
            echo "Timed out waiting for system identity principalId for production app" >&2
            exit 1
          fi

          # Give ARM/ACA a short stabilization window after principalId appears.
          sleep 20

          REGISTRY_IDENTITY="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query "properties.configuration.registries[?server=='${{ secrets.ACR_LOGIN_SERVER }}'].identity | [0]" -o tsv)"
          REGISTRY_SET=0
          if [[ "${REGISTRY_IDENTITY}" == "system" ]]; then
            REGISTRY_SET=1
          fi
          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            if [[ ${REGISTRY_SET} -eq 1 ]]; then
              break
            fi
            ensure_app_ready "production registry set"
            set +e
            REGISTRY_OUT="$(az containerapp registry set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --identity system \
              --output none 2>&1)"
            REGISTRY_CODE=$?
            set -e
            if [[ ${REGISTRY_CODE} -eq 0 ]]; then
              REGISTRY_SET=1
              break
            fi
            if echo "${REGISTRY_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "registry set not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${REGISTRY_OUT}" >&2
            exit ${REGISTRY_CODE}
          done
          if [[ ${REGISTRY_SET} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation during production registry set" >&2
            exit 1
          fi

          # Optional fallback: if ACR pull credentials are provided, bind the registry with credentials
          # to avoid any residual managed-identity propagation race during secret/env mutation.
          if [[ -n "${{ secrets.ACR_PULL_USERNAME }}" && -n "${{ secrets.ACR_PULL_PASSWORD }}" ]]; then
            ensure_app_ready "production registry credential fallback"
            az containerapp registry set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --server "${{ secrets.ACR_LOGIN_SERVER }}" \
              --username "${{ secrets.ACR_PULL_USERNAME }}" \
              --password "${{ secrets.ACR_PULL_PASSWORD }}" \
              --output none
          fi

          EXISTING_SECRETS="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query "properties.configuration.secrets[].name" -o tsv || true)"
          if grep -qx "azure-storage-connection-string" <<< "${EXISTING_SECRETS}" \
            && grep -qx "di-endpoint" <<< "${EXISTING_SECRETS}" \
            && grep -qx "di-key" <<< "${EXISTING_SECRETS}" \
            && grep -qx "openai-endpoint" <<< "${EXISTING_SECRETS}" \
            && grep -qx "openai-api-key" <<< "${EXISTING_SECRETS}"; then
            SECRET_SET=1
          else
            SECRET_SET=0
          fi

          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            if [[ ${SECRET_SET} -eq 1 ]]; then
              break
            fi
            ensure_app_ready "production secret set"
            set +e
            SECRET_OUT="$(az containerapp secret set \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --secrets \
              azure-storage-connection-string='${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}' \
              di-endpoint='${{ secrets.DI_ENDPOINT }}' \
              di-key='${{ secrets.DI_KEY }}' \
              openai-endpoint='${{ secrets.OPENAI_ENDPOINT }}' \
              openai-api-key='${{ secrets.OPENAI_API_KEY }}' \
              --output none 2>&1)"
            SECRET_CODE=$?
            set -e
            if [[ ${SECRET_CODE} -eq 0 ]]; then
              SECRET_SET=1
              break
            fi
            if echo "${SECRET_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "secret set not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${SECRET_OUT}" >&2
            exit ${SECRET_CODE}
          done
          if [[ ${SECRET_SET} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation during production secret set" >&2
            exit 1
          fi

          UPDATED=0
          for attempt in $(seq 1 "${MAX_PROPAGATION_ATTEMPTS}"); do
            ensure_app_ready "production env update"
            set +e
            UPDATE_OUT="$(az containerapp update \
              --name "${{ secrets.ACA_APP_NAME }}" \
              --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
              --set-env-vars \
              NODE_ENV=production \
              PORT=8080 \
              AZURE_STORAGE_CONNECTION_STRING=secretref:azure-storage-connection-string \
              DI_ENDPOINT=secretref:di-endpoint \
              DI_KEY=secretref:di-key \
              OPENAI_ENDPOINT=secretref:openai-endpoint \
              OPENAI_API_KEY=secretref:openai-api-key \
              OPENAI_DEPLOYMENT='${{ secrets.OPENAI_DEPLOYMENT }}' \
              EMBEDDING_MODEL='${{ secrets.EMBEDDING_MODEL }}' \
              --output none 2>&1)"
            UPDATE_CODE=$?
            set -e
            if [[ ${UPDATE_CODE} -eq 0 ]]; then
              UPDATED=1
              break
            fi
            if echo "${UPDATE_OUT}" | tr -d '\r' | grep -Eqi "${TRANSIENT_RETRY_PATTERN}"; then
              echo "env update not ready yet (attempt ${attempt}/${MAX_PROPAGATION_ATTEMPTS}); waiting ${PROPAGATION_DELAY_SECONDS}s..."
              sleep "${PROPAGATION_DELAY_SECONDS}"
              continue
            fi
            echo "${UPDATE_OUT}" >&2
            exit ${UPDATE_CODE}
          done
          if [[ ${UPDATED} -ne 1 ]]; then
            echo "Timed out waiting for system identity propagation for production app" >&2
            exit 1
          fi

      - name: Apply ACA manifest (production)
        shell: bash
        run: |
          set -euo pipefail
          cp backend/api/deploy/aca/containerapp.yaml containerapp.effective.yaml
          sed -i "s|<SUBSCRIPTION_ID>|${{ secrets.AZURE_SUBSCRIPTION_ID }}|g" containerapp.effective.yaml
          sed -i "s|<RG>|${{ secrets.ACA_RESOURCE_GROUP }}|g" containerapp.effective.yaml
          sed -i "s|<ACA_ENV_NAME>|${{ secrets.ACA_ENV_NAME }}|g" containerapp.effective.yaml
          sed -i "s|<ACR_NAME>|${{ secrets.ACR_NAME }}|g" containerapp.effective.yaml
          sed -i "s|<TAG>|${{ needs.resolve-image.outputs.tag }}|g" containerapp.effective.yaml
          sed -i "s|name: inchanted-api|name: ${{ secrets.ACA_APP_NAME }}|" containerapp.effective.yaml
          sed -i "s|<BUILD_TIMESTAMP_ISO8601>|$(date -u +%Y-%m-%dT%H:%M:%SZ)|g" containerapp.effective.yaml
          sed -i "s|<GIT_COMMIT_SHA>|${{ github.sha }}|g" containerapp.effective.yaml
          sed -i "s|<WAVE9_ENGINE_VERSION>|${{ needs.resolve-image.outputs.tag }}|g" containerapp.effective.yaml
          sed -i "s|<REVISION_SUFFIX>|wave9-$(echo "${{ github.sha }}" | cut -c1-8)|g" containerapp.effective.yaml

          az containerapp update \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --yaml containerapp.effective.yaml \
            --output none

      - name: Pin deployed image to resolved digest (production)
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --image "${{ needs.resolve-image.outputs.image }}" \
            --output none

      - name: Verify new revision creation (production)
        id: rev
        shell: bash
        run: |
          set -euo pipefail
          REVISION="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.latestReadyRevisionName -o tsv)"
          if [[ -z "${REVISION}" ]]; then
            echo "No latest ready revision found" >&2
            exit 1
          fi
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"

      - name: Verify container startup logs (production)
        shell: bash
        run: |
          az containerapp logs show \
            --name "${{ secrets.ACA_APP_NAME }}" \
            --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" \
            --tail 80

      - name: Post-deploy health probes (production)
        shell: bash
        run: |
          set -euo pipefail
          FQDN="$(az containerapp show --name "${{ secrets.ACA_APP_NAME }}" --resource-group "${{ secrets.ACA_RESOURCE_GROUP }}" --query properties.configuration.ingress.fqdn -o tsv)"
          BASE_URL="https://${FQDN}"

          curl -fsS "${BASE_URL}/api/ping"
          curl -fsS -H "x-actor-role: viewer" -H "x-tenant-id: aca-deploy" "${BASE_URL}/api/gethealth"
          curl -fsS "${BASE_URL}/api/version"
