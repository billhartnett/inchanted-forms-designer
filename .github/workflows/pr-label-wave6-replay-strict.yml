name: PR Label Wave6 Replay Strict Gate

on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - reopened
      - opened

jobs:
  requires-wave6-replay-strict-mode:
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'requires-wave6-replay-strict-mode')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            backend/package-lock.json
            backend/api/package-lock.json

      - name: Install shared dependencies
        run: npm --prefix shared ci --no-audit --no-fund

      - name: Install backend dependencies
        run: npm --prefix backend ci --no-audit --no-fund

      - name: Install backend api dependencies
        run: npm --prefix backend/api ci --no-audit --no-fund

      - name: Build shared
        run: npm --prefix shared run build

      - name: Build backend
        run: npm --prefix backend/api run build

      - name: Run Wave 6 replay strict integration
        run: npm --prefix backend/api run diag:replay:integration:wave6:strict

      - name: Validate strict replay classification fields
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='training-data/acord-labeled/wave6_phase1_replay_validation_report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));const ok=typeof r.hostHealthFailure==='boolean'&&typeof r.mappingThresholdFailure==='boolean';if(!ok){console.error('wave6 replay classification fields missing');process.exit(1);}if(!r.pass&&!['hostHealthFailure','mappingThresholdFailure'].includes(r.failureClass)){console.error('invalid failureClass',r.failureClass);process.exit(1);}console.log('wave6 replay classification ok');"

      - name: Validate replay regression gate
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='training-data/acord-labeled/wave6_phase1_replay_regression_report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));if(!r.validationReport||!r.validationReport.pass){console.error('wave6 replay regression gate failed');process.exit(1);}console.log('wave6 replay regression gate ok');"
